<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>songs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0e; --surface: #181818; --border: #2a2a2a;
    --text: #e8e8e8; --muted: #555; --accent: #c8f07a; --radius: 14px;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-weight: 300;
    min-height: 100vh; padding: 36px 20px 80px; text-transform: lowercase;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  .menu-btn {
    background: none; border: none; cursor: pointer;
    padding: 4px; display: flex; flex-direction: column;
    gap: 5px; margin-bottom: 44px;
  }
  .menu-btn span {
    display: block; width: 22px; height: 1.5px;
    background: var(--muted); border-radius: 2px; transition: background .15s;
  }
  .menu-btn:hover span { background: var(--text); }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 10; }
  .overlay.open { display: block; }
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; width: 260px;
    background: var(--surface); border-right: 1px solid var(--border);
    padding: 32px 20px; z-index: 11;
    transform: translateX(-100%); transition: transform .22s ease;
    display: flex; flex-direction: column; overflow-y: auto;
  }
  .sidebar.open { transform: none; }
  .close-btn {
    background: none; border: none; color: var(--muted);
    font-size: 1rem; cursor: pointer; text-align: left;
    padding: 0; margin-bottom: 28px; font-family: 'DM Mono', monospace;
    flex-shrink: 0;
  }
  .close-btn:hover { color: var(--text); }
  .sidebar-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .s-item {
    border-radius: var(--radius); padding: 10px 12px;
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--bg);
  }
  .s-icon { font-size: 0.8rem; margin-top: 1px; flex-shrink: 0; opacity: .4; }
  .s-body { flex: 1; min-width: 0; }
  .s-title { font-size: 0.8rem; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .s-artist { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  .s-link {
    font-size: 0.68rem; color: var(--accent); text-decoration: none;
    display: block; margin-top: 2px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; opacity: .6;
  }
  .s-link:hover { opacity: 1; }
  .s-del {
    display: none; background: none; border: none; color: #ff5555;
    font-size: 0.68rem; font-family: 'DM Mono', monospace;
    cursor: pointer; padding: 0; opacity: .5; flex-shrink: 0;
  }
  .s-del:hover { opacity: 1; }
  body.admin-mode .s-del { display: block; }
  .admin-dot {
    display: none; width: 5px; height: 5px;
    border-radius: 50%; background: var(--accent); margin-bottom: 40px;
  }
  body.admin-mode .admin-dot { display: block; }
  .tabs { display: flex; gap: 6px; margin-bottom: 18px; }
  .tab {
    background: none; border: none;
    padding: 5px 14px; font-size: 0.78rem;
    font-family: 'DM Sans', sans-serif; font-weight: 300;
    color: var(--muted); cursor: pointer;
    transition: font-size .15s, color .15s; text-transform: lowercase;
    outline: none;
  }
  .tab.active { color: var(--accent); font-size: 0.92rem; }
  .panel { display: none; flex-direction: column; gap: 10px; }
  .panel.active { display: flex; }
  input, textarea {
    background: var(--surface); border: none; box-shadow: none;
    border-radius: var(--radius); padding: 11px 14px;
    font-size: 0.85rem; font-family: 'DM Sans', sans-serif;
    font-weight: 300; color: var(--text); width: 100%;
    outline: none; text-transform: lowercase; appearance: none;
    -webkit-appearance: none;
  }
  input::placeholder, textarea::placeholder { color: var(--muted); }
  textarea { resize: none; height: 68px; line-height: 1.5; }
  .row { display: flex; gap: 10px; }
  .row input { flex: 1; }
  .submit {
    margin-top: 4px; background: var(--accent); color: #0e0e0e;
    border: none; border-radius: var(--radius); padding: 11px 22px;
    font-size: 0.82rem; font-family: 'DM Mono', monospace; font-weight: 400;
    cursor: pointer; align-self: flex-start; outline: none;
    transition: opacity .15s, transform .1s; text-transform: lowercase;
  }
  .submit:hover { opacity: .85; }
  .submit:active { transform: scale(.97); }
  .submit:disabled { opacity: .35; cursor: default; transform: none; }
</style>
</head>
<body>
<div class="wrap">

  <button class="menu-btn" onclick="openSidebar()" aria-label="menu">
    <span></span><span></span><span></span>
  </button>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
  <nav class="sidebar" id="sidebar">
    <button class="close-btn" onclick="closeSidebar()">✕</button>
    <ul class="sidebar-list" id="sidebarList"></ul>
  </nav>

  <div class="admin-dot"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('manual')">type it</button>
    <button class="tab" onclick="switchTab('link')">paste link</button>
  </div>

  <div class="panel active" id="panel-manual">
    <div class="row">
      <input type="text" id="m-title" placeholder="song title" maxlength="120">
      <input type="text" id="m-artist" placeholder="artist" maxlength="80">
    </div>
    <textarea id="m-note" placeholder="note (optional)"></textarea>
    <button class="submit" id="btn-manual" onclick="submitManual()">add</button>
  </div>

  <div class="panel" id="panel-link">
    <input type="url" id="l-url" placeholder="spotify / youtube / etc" maxlength="300">
    <textarea id="l-note" placeholder="note (optional)"></textarea>
    <button class="submit" id="btn-link" onclick="submitLink()">add</button>
  </div>

</div>
<script>
  const BIN_ID  = '6a1875d5ddf5aa59f770b5ea';
  const API_KEY = '$2a$10$jHWMbBExEFMfeR9a2Ms89um6cscjnxHjIXYih4QT5Gb1C1zosBdNK';
  const BASE    = 'https://api.jsonbin.io/v3/b/' + BIN_ID;
  const HEADERS = {
    'Content-Type': 'application/json',
    'X-Master-Key': API_KEY,
    'X-Bin-Versioning': 'false'
  };

  let recs = [];
  let adminMode = false;
  let eCount = 0, eTimer = null;

  document.addEventListener('keydown', ev => {
    if (ev.key !== 'e') { eCount = 0; clearTimeout(eTimer); return; }
    eCount++;
    clearTimeout(eTimer);
    eTimer = setTimeout(() => { eCount = 0; }, 2000);
    if (eCount >= 10) {
      eCount = 0;
      adminMode = !adminMode;
      document.body.classList.toggle('admin-mode', adminMode);
    }
  });

  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('overlay').classList.add('open');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i===0 && tab==='manual') || (i===1 && tab==='link'));
    });
    document.getElementById('panel-manual').classList.toggle('active', tab==='manual');
    document.getElementById('panel-link').classList.toggle('active', tab==='link');
  }
  function lock(id)   { const b = document.getElementById(id); b.disabled = true;  b.textContent = '...'; }
  function unlock(id) { const b = document.getElementById(id); b.disabled = false; b.textContent = 'add'; }

  async function fetchRecs() {
    try {
      const res  = await fetch(BASE + '/latest', { headers: HEADERS });
      const data = await res.json();
      recs = data.record?.recs || [];
    } catch { recs = []; }
    render();
  }

  async function saveRecs() {
    await fetch(BASE, {
      method: 'PUT',
      headers: HEADERS,
      body: JSON.stringify({ recs })
    });
  }

  async function submitManual() {
    const title  = document.getElementById('m-title').value.trim();
    const artist = document.getElementById('m-artist').value.trim();
    const note   = document.getElementById('m-note').value.trim();
    if (!title) { document.getElementById('m-title').focus(); return; }
    lock('btn-manual');
    recs.unshift({ id: Date.now(), type: 'manual', title, artist, note });
    await saveRecs();
    document.getElementById('m-title').value  = '';
    document.getElementById('m-artist').value = '';
    document.getElementById('m-note').value   = '';
    unlock('btn-manual');
    render();
  }

  async function submitLink() {
    const url  = document.getElementById('l-url').value.trim();
    const note = document.getElementById('l-note').value.trim();
    if (!url) { document.getElementById('l-url').focus(); return; }
    lock('btn-link');
    recs.unshift({ id: Date.now(), type: 'link', url, note });
    await saveRecs();
    document.getElementById('l-url').value  = '';
    document.getElementById('l-note').value = '';
    unlock('btn-link');
    render();
  }

  async function deleteRec(id) {
    recs = recs.filter(r => r.id !== id);
    await saveRecs();
    render();
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const list = document.getElementById('sidebarList');
    list.innerHTML = '';
    recs.forEach(r => {
      const li = document.createElement('li');
      li.className = 's-item';
      const del = '<button class="s-del" onclick="deleteRec(' + r.id + ')">✕</button>';
      if (r.type === 'manual') {
        li.innerHTML =
          '<div class="s-icon">♪</div>' +
          '<div class="s-body">' +
            '<div class="s-title">' + esc(r.title) + '</div>' +
            (r.artist ? '<div class="s-artist">' + esc(r.artist) + '</div>' : '') +
          '</div>' + del;
      } else {
        li.innerHTML =
          '<div class="s-icon">↗</div>' +
          '<div class="s-body">' +
            '<a class="s-link" href="' + esc(r.url) + '" target="_blank" rel="noopener">' + esc(r.url) + '</a>' +
          '</div>' + del;
      }
      list.appendChild(li);
    });
  }

  fetchRecs();
</script>
</body>
</html>
